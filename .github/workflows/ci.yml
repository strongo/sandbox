name: Go CI

on:
  push:
    branches-ignore:
      - renovate/**
    tags:
      - 'v[0-9]+\.[0-9]+\.[0-9]+' # Push events to matching v*, i.e. v20.15.10
    paths:
      - '.github/workflows/**.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/**.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'

jobs:

  strongo_workflow:
    permissions:
      contents: write
    uses: strongo/go-ci-action/.github/workflows/workflow.yml@main
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  # Real-Docker integration test (RunOnce against a live daemon). The unit
  # tests skip it unless SANDBOX_INTEGRATION is set; GitHub-hosted ubuntu
  # runners ship a running Docker daemon, so we enable it here.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Docker integration test
        env:
          SANDBOX_INTEGRATION: '1'
        run: go test -run Integration -count=1 -v ./...
